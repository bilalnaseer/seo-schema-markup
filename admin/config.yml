# Sveltia CMS configuration — controls what the /admin editor can do.
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: bilalnaseer/seo-schema-markup      # <-- your GitHub repo (owner/name)
  branch: main
  # OAuth bridge so the team logs in without touching GitHub directly.
  # Replace with your deployed sveltia-cms-auth Worker origin (see BLOG-SETUP.md):
  base_url: https://sveltiacms.bilalnaseer01.workers.dev

# Posts go through Draft -> In review -> Ready. Nothing publishes until approved
# (you merge/approve from inside this same CMS UI — no GitHub knowledge needed).
publish_mode: editorial_workflow

# Cover images uploaded in the editor land here and are referenced as /assets/img/blog/...
media_folder: "assets/img/blog"
public_folder: "/assets/img/blog"

# Friendlier commit messages in the repo history.
backend_commit_messages: &commit_messages
  create: 'Blog: create "{{slug}}"'
  update: 'Blog: update "{{slug}}"'
  delete: 'Blog: delete "{{slug}}"'
  uploadMedia: 'Blog: upload {{path}}'
  deleteMedia: 'Blog: delete {{path}}'

collections:
  - name: blog
    label: "Blog posts"
    label_singular: "Blog post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"                        # filename = URL slug
    extension: md
    format: frontmatter
    summary: "{{title}}  ·  {{date}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Meta description (for Google & social)", widget: string, required: true, hint: "~150 characters. Shows in search results." }
      - { name: date, label: "Publish date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { name: updated, label: "Last updated (optional)", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true, required: false }
      - { name: author, label: "Author name", widget: string, default: "Bilal Naseer" }
      - { name: author_url, label: "Author URL (optional)", widget: string, required: false, default: "https://websensepro.com" }
      - { name: image, label: "Cover image (optional)", widget: image, required: false, hint: "Used for the card, social preview and article schema." }
      - { name: tags, label: "Tags (optional)", widget: list, required: false }
      - { name: draft, label: "Draft (hide from site)", widget: boolean, default: false }
      - { name: body, label: "Post content", widget: markdown }
